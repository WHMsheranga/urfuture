<html>
<style>
.video-banner video {
    position: absolute;
    top: 50%;
    left: 50%;
    min-width: 100%;
    min-height: 100%;
    transform: translate(-50%, -50%);
    object-fit: cover;
}
.video-banner {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden;
}
.overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: white;
    z-index: 1;
}

.overlay h1 {
    font-size: 50px;
    margin-bottom: 10px;
}

.overlay p {
    font-size: 20px;
}
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}

</style>
<body>
    <div class="video-banner">
    <video autoplay muted loop playsinline>
        <source src="Video Project.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
